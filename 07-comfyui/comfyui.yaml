# Startup hook run by comfyui-nvidia-docker's init on every container start
# (after venv/ComfyUI setup, before the server launches). Keeps pip deps
# self-healing across image upgrades and venv rebuilds.
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    app: comfyui
  name: comfyui-user-script
  namespace: ai
data:
  user_script.bash: |
    #!/bin/bash
    set -e
    PIP=/comfy/mnt/venv/bin/pip

    # 1. Self-heal: ensure every custom node's python deps are present
    #    (no-op when satisfied; rebuilds them after a fresh venv).
    for req in /basedir/custom_nodes/*/requirements.txt; do
      [ -f "$req" ] && $PIP install --no-cache-dir -r "$req"
    done

    # 2. Version pins LAST so they win over whatever the steps above pulled.
    #    torch 2.6 (cu124) breaks with transformers >= 4.54
    #    (torch.float8_e8m0fnu). Revisit when the image moves to torch >= 2.7.
    $PIP install --no-cache-dir "transformers==4.51.3"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: comfyui
  name: comfyui
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comfyui
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: comfyui
    spec:
      containers:
      # NOTE: NVIDIA_VISIBLE_DEVICES (GPU pin) is deliberately NOT managed
      # here — it is set live on the cluster and switched between GPUs as
      # needed. If a future sync strips it, re-add via kubectl edit/patch.
      - env:
        - name: COMFY_CMDLINE_EXTRA
          value: --listen 0.0.0.0
        - name: WANTED_UID
          value: '1024'
        - name: WANTED_GID
          value: '1024'
        - name: BASE_DIRECTORY
          value: /basedir
        - name: SECURITY_LEVEL
          value: normal
        - name: USE_UV
          value: 'true'
        image: mmartial/comfyui-nvidia-docker:ubuntu22_cuda12.4.1-latest
        imagePullPolicy: IfNotPresent
        name: comfyui
        ports:
        - containerPort: 8188
          name: 8188tcp
        resources:
          limits:
            nvidia.com/gpu: '1'
          requests:
            nvidia.com/gpu: '1'
        volumeMounts:
        # basedir = models/custom_nodes/outputs; run = venv + ComfyUI + HF
        # cache. BOTH must be PVC-backed or installs die with the pod.
        - mountPath: /basedir
          name: data
          subPath: basedir
        - mountPath: /comfy/mnt
          name: data
          subPath: run
        - mountPath: /comfy/mnt/user_script.bash
          name: user-script
          subPath: user_script.bash
      runtimeClassName: nvidia
      securityContext:
        fsGroup: 1024
        runAsGroup: 1024
        runAsUser: 1024
        supplementalGroups:
        - 44
        - 109
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: comfyui-data
      - name: user-script
        configMap:
          defaultMode: 0o755
          name: comfyui-user-script
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: comfyui-filebrowser
  name: comfyui-filebrowser
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comfyui-filebrowser
  template:
    metadata:
      labels:
        app: comfyui-filebrowser
    spec:
      containers:
      - args:
        - --root=/srv
        - --address=0.0.0.0
        - --port=8080
        - --database=/config/filebrowser.db
        image: filebrowser/filebrowser:latest
        name: filebrowser
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - mountPath: /srv
          name: comfyui-data
          subPath: basedir
        - mountPath: /config
          name: fb-config
      securityContext:
        fsGroup: 1024
        runAsGroup: 1024
        runAsUser: 1024
      volumes:
      - name: comfyui-data
        persistentVolumeClaim:
          claimName: comfyui-data
      - emptyDir: {}
        name: fb-config
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: comfyui
  name: comfyui
  namespace: ai
spec:
  ports:
  - port: 80
    targetPort: 8188
  selector:
    app: comfyui
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: comfyui-filebrowser
  name: comfyui-filebrowser
  namespace: ai
spec:
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: comfyui-filebrowser
  type: LoadBalancer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: comfyui-data
  namespace: ai
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 150Gi
  storageClassName: longhorn
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glm-model-pvc
  namespace: ai
spec:
  accessModes:
  - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
