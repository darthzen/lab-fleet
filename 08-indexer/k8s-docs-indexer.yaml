apiVersion: batch/v1
kind: CronJob
metadata:
  name: k8s-docs-indexer
  namespace: ai
spec:
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 7200
      backoffLimit: 2
      template:
        spec:
          containers:
          - env:
            - name: OLLAMA_URL
              value: http://ollama.ai.svc.cluster.local:11434
            - name: MILVUS_URI
              value: http://milvus.ai.svc.cluster.local:19530
            - name: EMBED_MODEL
              value: nomic-embed-text
            - name: EMBED_DIM
              value: '768'
            - name: COLLECTION
              value: k8s_docs
            - name: WORKDIR
              value: /work
            - name: STATE_DIR
              value: /state
            image: k8s-docs-indexer:latest
            imagePullPolicy: IfNotPresent
            name: indexer
            resources:
              limits:
                cpu: '2'
                memory: 4Gi
              requests:
                cpu: 500m
                memory: 1Gi
            volumeMounts:
            - mountPath: /state
              name: state
            - mountPath: /work
              name: work
          restartPolicy: Never
          volumes:
          - name: state
            persistentVolumeClaim:
              claimName: k8s-docs-indexer-state
          - emptyDir:
              sizeLimit: 5Gi
            name: work
  schedule: 0 3 * * 0
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8s-docs-indexer-state
  namespace: ai
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: longhorn
